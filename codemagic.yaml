workflows:
  ios-build-workflow:
    name: iOS Unsigned Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Set up local properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Pre-generate configuration and Inject Permission Macros
        script: |
          # Generujemy domyślne środowisko iOS
          flutter build ios --config-only
          
          # Wstrzykujemy flagi preprocesora bezpośrednio do konfiguracji Xcode zamiast Podfile
          echo "GCC_PREPROCESSOR_DEFINITIONS =\$(inherited) PERMISSION_LOCATION=1 PERMISSION_SENSORS=1" >> ios/Flutter/Generated.xcconfig
          
          # Wymuszamy całkowite wyłączenie podpisywania kodu na poziomie ustawień kompilacji Xcode
          echo "CODE_SIGNING_ALLOWED = NO" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGNING_REQUIRED = NO" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGN_IDENTITY = " >> ios/Flutter/Generated.xcconfig
      - name: Build iOS project without signing
        script: |
          # Dodajemy jawne wymuszenie parametrów dla Xcode, aby zignorował brak Team ID
          flutter build ios --no-codesign --release --extra-front-end-options=--implicit-dwes --xcconfig-overrides=ios/Flutter/Generated.xcconfig
    artifacts:
      - build/ios/iphoneos/Runner.app
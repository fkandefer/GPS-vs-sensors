workflows:
  ios-build-workflow:
    name: iOS Unsigned Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Set up local properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Pre-generate configuration and Inject Permission Macros
        script: |
          # Budujemy bazę projektu
          flutter build ios --config-only
          
          # Wstrzykujemy makra uprawnień lokalizacji i ruchu dla iOS
          echo "GCC_PREPROCESSOR_DEFINITIONS =\$(inherited) PERMISSION_LOCATION=1 PERMISSION_SENSORS=1" >> ios/Flutter/Generated.xcconfig
          
          # Instalujemy pody dla CocoaPods, żeby Xcode widział wtyczki
          cd ios && pod install
      - name: Build iOS project without signing
        script: |
          # Budujemy bezpośrednio przez xcodebuild, wymuszając brak podpisywania i pomijając sprawdzanie Team ID
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            COMPILER_INDEX_STORE_ENABLE=NO
    artifacts:
      - ios/build/Runner.app